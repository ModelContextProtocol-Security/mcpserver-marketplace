name: Validate CSV

on:
  pull_request:
    paths:
      - "data/*.csv"
      - "scripts/validate_csv.py"
      - ".github/workflows/validate-csv.yml"
  push:
    branches: [main]
    paths:
      - "data/*.csv"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Field-count check on data/*.csv
        run: python3 scripts/validate_csv.py
